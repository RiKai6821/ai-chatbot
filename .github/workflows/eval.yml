name: Agent Eval

# 真实端到端评测（会调用大模型、消耗额度），所以不在每次 push 跑，
# 改为手动触发或每周定时。需在仓库 Settings → Secrets 里配置 DASHSCOPE_API_KEY。
on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: "0 0 * * 1"     # 每周一 00:00 UTC

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-server.txt

      - name: Run agent eval
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python eval_agent.py
