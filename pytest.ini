[pytest]
# 把仓库根目录加进 sys.path，这样 tests/ 里能 import tools/store/rag 等根级模块。
# 不加的话，用 `pytest`（控制台脚本，CI 用的就是它）跑会 ModuleNotFoundError，
# 因为控制台脚本不像 `python -m pytest` 那样把当前目录放进 sys.path。
pythonpath = .

# 只在 tests/ 下收集，且只认 test_*.py。
# 否则 pytest 默认也会收集 mic_test.py / tts_test.py / worker_audio_test.py
# 这些"硬件自测脚本"——它们在导入时就会打开麦克风/喇叭或依赖未安装的库，
# 会让 CI 失败（也会卡住本地）。
testpaths = tests
python_files = test_*.py
